<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="white"/>
  <!-- Garlic Press - side view -->
  <!-- Top handle -->
  <path d="M80 120 Q80 110 90 110 L200 110 Q210 110 210 120" fill="none" stroke="#333" stroke-width="5" stroke-linecap="round"/>
  <path d="M210 120 L210 180" stroke="#333" stroke-width="5" stroke-linecap="round"/>
  <path d="M80 120 L80 180" stroke="#333" stroke-width="5" stroke-linecap="round"/>
  <!-- Handle grip area - top -->
  <rect x="80" y="110" width="130" height="14" rx="4" fill="#b0b0b0" stroke="#333" stroke-width="3"/>
  <!-- Bottom handle -->
  <path d="M80 220 Q80 210 90 210 L200 210 Q210 210 210 220" fill="none" stroke="#333" stroke-width="5" stroke-linecap="round"/>
  <path d="M210 220 L210 180" stroke="#333" stroke-width="5" stroke-linecap="round"/>
  <path d="M80 220 L80 180" stroke="#333" stroke-width="5" stroke-linecap="round"/>
  <!-- Handle grip area - bottom -->
  <rect x="80" y="218" width="130" height="14" rx="4" fill="#b0b0b0" stroke="#333" stroke-width="3"/>
  <!-- Hinge/pivot -->
  <circle cx="210" cy="180" r="10" fill="#999" stroke="#333" stroke-width="3"/>
  <circle cx="210" cy="180" r="4" fill="#666"/>
  <!-- Press chamber (top part - plunger) -->
  <path d="M230 120 L320 145 Q340 152 340 165 Q340 178 320 172 L230 180" fill="#c0c0c0" stroke="#333" stroke-width="4"/>
  <!-- Press chamber (bottom part - with holes) -->
  <path d="M230 220 L320 195 Q345 188 345 175 Q345 162 320 168" fill="none" stroke="#333" stroke-width="4"/>
  <path d="M230 220 L320 195" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <!-- Chamber cup shape -->
  <ellipse cx="335" cy="175" rx="18" ry="22" fill="#d0d0d0" stroke="#333" stroke-width="3"/>
  <!-- Press holes in chamber -->
  <circle cx="328" cy="168" r="2.5" fill="#666"/>
  <circle cx="335" cy="168" r="2.5" fill="#666"/>
  <circle cx="342" cy="168" r="2.5" fill="#666"/>
  <circle cx="331" cy="175" r="2.5" fill="#666"/>
  <circle cx="338" cy="175" r="2.5" fill="#666"/>
  <circle cx="328" cy="182" r="2.5" fill="#666"/>
  <circle cx="335" cy="182" r="2.5" fill="#666"/>
  <circle cx="342" cy="182" r="2.5" fill="#666"/>
  <!-- Garlic clove near press -->
  <path d="M300 280 Q310 250 325 260 Q340 270 330 290 Q320 305 305 300 Q295 295 300 280Z" fill="#f5f0e0" stroke="#333" stroke-width="2.5"/>
  <path d="M312 260 Q315 270 313 285" fill="none" stroke="#ccc" stroke-width="1.5"/>
  <!-- Small garlic bits coming out -->
  <circle cx="350" cy="190" r="3" fill="#f5f0e0" stroke="#999" stroke-width="1"/>
  <circle cx="358" cy="185" r="2" fill="#f5f0e0" stroke="#999" stroke-width="1"/>
  <circle cx="355" cy="195" r="2.5" fill="#f5f0e0" stroke="#999" stroke-width="1"/>
</svg>
