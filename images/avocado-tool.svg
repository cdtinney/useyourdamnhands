<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="white"/>
  <!-- 3-in-1 Avocado Tool -->
  <!-- Handle -->
  <rect x="170" y="20" width="60" height="80" rx="12" fill="#4a9e4a" stroke="#333" stroke-width="3"/>
  <!-- Handle grip lines -->
  <line x1="182" y1="35" x2="218" y2="35" stroke="#3a7e3a" stroke-width="2"/>
  <line x1="182" y1="48" x2="218" y2="48" stroke="#3a7e3a" stroke-width="2"/>
  <line x1="182" y1="61" x2="218" y2="61" stroke="#3a7e3a" stroke-width="2"/>
  <line x1="182" y1="74" x2="218" y2="74" stroke="#3a7e3a" stroke-width="2"/>
  <!-- Blade section - serrated knife edge -->
  <rect x="175" y="100" width="50" height="100" fill="#d0d0d0" stroke="#333" stroke-width="2.5"/>
  <!-- Serrated edge on right side -->
  <path d="M225 105 L232 110 L225 115 L232 120 L225 125 L232 130 L225 135 L232 140 L225 145 L232 150 L225 155 L232 160 L225 165 L232 170 L225 175 L232 180 L225 185 L232 190 L225 195" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Pit remover section - center circle with blade teeth -->
  <rect x="175" y="210" width="50" height="60" fill="#4a9e4a" stroke="#333" stroke-width="2.5"/>
  <circle cx="200" cy="240" r="18" fill="white" stroke="#333" stroke-width="2.5"/>
  <!-- Teeth inside pit remover -->
  <path d="M188 228 L195 235" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M212 228 L205 235" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M188 252 L195 245" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M212 252 L205 245" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Scoop/fan section at bottom -->
  <path d="M165 280 Q130 320 140 360 Q160 385 200 388 Q240 385 260 360 Q270 320 235 280" fill="#d0d0d0" stroke="#333" stroke-width="3"/>
  <line x1="170" y1="280" x2="230" y2="280" stroke="#333" stroke-width="2.5"/>
  <!-- Fan ridges on scoop -->
  <path d="M200 280 L200 380" stroke="#aaa" stroke-width="1.5"/>
  <path d="M180 282 L165 370" stroke="#aaa" stroke-width="1.5"/>
  <path d="M220 282 L235 370" stroke="#aaa" stroke-width="1.5"/>
  <path d="M190 281 L182 378" stroke="#aaa" stroke-width="1.5"/>
  <path d="M210 281 L218 378" stroke="#aaa" stroke-width="1.5"/>
</svg>
