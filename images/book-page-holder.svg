<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="white"/>
  <!-- Book Page Holder - small plastic thumb ring with flat paddle -->
  <!-- Open book - slight V shape from above -->
  <!-- Left page -->
  <path d="M45 70 Q100 80 195 75 L195 340 Q100 345 45 335 Z" fill="#f8f4ec" stroke="#333" stroke-width="2.5"/>
  <!-- Right page -->
  <path d="M205 75 Q300 80 355 70 L355 335 Q300 345 205 340 Z" fill="#f8f4ec" stroke="#333" stroke-width="2.5"/>
  <!-- Book spine shadow -->
  <line x1="200" y1="73" x2="200" y2="342" stroke="#333" stroke-width="3"/>
  <!-- Text lines on left page -->
  <line x1="65" y1="105" x2="178" y2="100" stroke="#ccc" stroke-width="2"/>
  <line x1="65" y1="125" x2="178" y2="120" stroke="#ccc" stroke-width="2"/>
  <line x1="65" y1="145" x2="178" y2="140" stroke="#ccc" stroke-width="2"/>
  <line x1="65" y1="165" x2="178" y2="160" stroke="#ccc" stroke-width="2"/>
  <line x1="65" y1="185" x2="178" y2="180" stroke="#ccc" stroke-width="2"/>
  <line x1="65" y1="205" x2="178" y2="200" stroke="#ccc" stroke-width="2"/>
  <line x1="65" y1="225" x2="178" y2="220" stroke="#ccc" stroke-width="2"/>
  <line x1="65" y1="245" x2="130" y2="242" stroke="#ccc" stroke-width="2"/>
  <line x1="65" y1="275" x2="178" y2="270" stroke="#ccc" stroke-width="2"/>
  <line x1="65" y1="295" x2="178" y2="290" stroke="#ccc" stroke-width="2"/>
  <line x1="65" y1="315" x2="140" y2="312" stroke="#ccc" stroke-width="2"/>
  <!-- Text lines on right page -->
  <line x1="222" y1="100" x2="338" y2="105" stroke="#ccc" stroke-width="2"/>
  <line x1="222" y1="120" x2="338" y2="125" stroke="#ccc" stroke-width="2"/>
  <line x1="222" y1="140" x2="338" y2="145" stroke="#ccc" stroke-width="2"/>
  <line x1="222" y1="160" x2="338" y2="165" stroke="#ccc" stroke-width="2"/>
  <line x1="222" y1="180" x2="338" y2="185" stroke="#ccc" stroke-width="2"/>
  <line x1="222" y1="200" x2="338" y2="205" stroke="#ccc" stroke-width="2"/>
  <line x1="222" y1="220" x2="338" y2="225" stroke="#ccc" stroke-width="2"/>
  <line x1="222" y1="240" x2="290" y2="243" stroke="#ccc" stroke-width="2"/>
  <line x1="222" y1="270" x2="338" y2="275" stroke="#ccc" stroke-width="2"/>
  <line x1="222" y1="290" x2="338" y2="295" stroke="#ccc" stroke-width="2"/>
  <line x1="222" y1="310" x2="300" y2="313" stroke="#ccc" stroke-width="2"/>
  <!-- Book cover visible at edges -->
  <path d="M40 67 L40 340 Q100 350 195 345" fill="none" stroke="#8B4513" stroke-width="3.5"/>
  <path d="M360 67 L360 340 Q300 350 205 345" fill="none" stroke="#8B4513" stroke-width="3.5"/>
  <path d="M40 340 L360 340" stroke="#8B4513" stroke-width="3"/>
  <!-- The page holder device sitting on right page, center area -->
  <!-- Thumb ring - oval ring shape -->
  <ellipse cx="280" cy="195" rx="22" ry="28" fill="#f0c040" stroke="#333" stroke-width="3"/>
  <ellipse cx="280" cy="195" rx="13" ry="18" fill="#f8f4ec" stroke="#333" stroke-width="2.5"/>
  <!-- Flat paddle/wing extending from ring to hold page down -->
  <path d="M260 178 L225 170 Q215 168 215 178 L215 212 Q215 222 225 220 L260 212Z" fill="#f0c040" stroke="#333" stroke-width="2.5"/>
  <!-- Grip bumps on paddle -->
  <circle cx="238" cy="188" r="3" fill="#d0a020" stroke="#333" stroke-width="1"/>
  <circle cx="228" cy="195" r="3" fill="#d0a020" stroke="#333" stroke-width="1"/>
  <circle cx="238" cy="202" r="3" fill="#d0a020" stroke="#333" stroke-width="1"/>
</svg>
