<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="white"/>
  <!-- Person tearing lettuce triumphantly with hands -->
  <!-- Head -->
  <circle cx="200" cy="85" r="45" fill="none" stroke="black" stroke-width="3"/>
  <!-- Triumphant eyes -->
  <path d="M180 76 Q185 70 190 76" fill="none" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <path d="M210 76 Q215 70 220 76" fill="none" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <!-- Big triumphant grin -->
  <path d="M177 102 Q200 125 223 102" fill="none" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <!-- Blush -->
  <line x1="160" y1="92" x2="170" y2="92" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <line x1="230" y1="92" x2="240" y2="92" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <!-- Body -->
  <line x1="200" y1="130" x2="200" y2="240" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <!-- Left arm tearing outward -->
  <path d="M200 175 Q150 180 120 200" fill="none" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <!-- Right arm tearing outward -->
  <path d="M200 175 Q250 180 280 200" fill="none" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <!-- Left hand fingers gripping lettuce -->
  <path d="M115 200 L108 208" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M118 198 L112 207" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M122 197 L118 207" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right hand fingers gripping lettuce -->
  <path d="M278 200 L285 208" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M282 198 L288 207" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M284 197 L290 207" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left lettuce piece -->
  <path d="M85 210 Q100 195 120 205 Q115 225 95 225 Q80 220 85 210Z" fill="none" stroke="black" stroke-width="2.5"/>
  <!-- Right lettuce piece -->
  <path d="M275 210 Q290 195 310 205 Q310 225 295 225 Q278 222 275 210Z" fill="none" stroke="black" stroke-width="2.5"/>
  <!-- Tear lines in middle -->
  <line x1="185" y1="195" x2="180" y2="185" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <line x1="195" y1="193" x2="195" y2="182" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <line x1="205" y1="193" x2="205" y2="182" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <line x1="215" y1="195" x2="220" y2="185" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <!-- RIP! text -->
  <text x="183" y="178" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="black">RIP!</text>
  <!-- Beautiful torn lettuce on counter -->
  <line x1="80" y1="275" x2="320" y2="275" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <!-- Bowl of perfect torn lettuce -->
  <path d="M155 275 Q200 300 245 275" fill="none" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <!-- Lettuce leaves in bowl -->
  <path d="M170 268 Q180 258 190 268" fill="none" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M185 265 Q195 255 205 265" fill="none" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M200 268 Q210 258 220 268" fill="none" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <!-- No browning text -->
  <text x="165" y="310" font-family="Georgia, serif" font-size="11" fill="black">*no browning*</text>
  <!-- Sparkles -->
  <path d="M100 65 L103 57 L106 65 L114 62 L106 67 L110 75 L104 69 L100 75 L102 67 L94 63Z" fill="black" stroke="none"/>
  <path d="M290 60 L293 52 L296 60 L304 57 L296 62 L300 70 L294 64 L290 70 L292 62 L284 58Z" fill="black" stroke="none"/>
  <!-- Legs -->
  <line x1="200" y1="240" x2="178" y2="340" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="240" x2="222" y2="340" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <path d="M178 340 L163 345" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <path d="M222 340 L237 345" stroke="black" stroke-width="3" stroke-linecap="round"/>
</svg>
