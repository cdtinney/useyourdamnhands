<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="white"/>
  <!-- Package Opener Tool - safety cutter style -->
  <!-- Main body -->
  <path d="M80 160 L280 160 Q300 160 310 175 L310 225 Q300 240 280 240 L80 240 Q65 240 60 225 L60 175 Q65 160 80 160Z" fill="#e87030" stroke="#333" stroke-width="3"/>
  <!-- Grip indent -->
  <path d="M100 170 Q95 200 100 230" fill="none" stroke="#c05020" stroke-width="2.5"/>
  <path d="M130 168 Q125 200 130 232" fill="none" stroke="#c05020" stroke-width="2.5"/>
  <path d="M160 167 Q155 200 160 233" fill="none" stroke="#c05020" stroke-width="2.5"/>
  <path d="M190 167 Q185 200 190 233" fill="none" stroke="#c05020" stroke-width="2.5"/>
  <!-- Blade housing at front -->
  <path d="M280 165 L330 185 Q340 192 340 200 Q340 208 330 215 L280 235" fill="#d06020" stroke="#333" stroke-width="3"/>
  <!-- Recessed blade slot -->
  <path d="M310 190 L345 197 Q350 200 345 203 L310 210" fill="#444" stroke="#333" stroke-width="2"/>
  <!-- Blade edge visible in slot -->
  <line x1="330" y1="197" x2="348" y2="200" stroke="#ccc" stroke-width="2"/>
  <!-- Blade slider button on top -->
  <rect x="230" y="148" width="40" height="16" rx="5" fill="#c05020" stroke="#333" stroke-width="2.5"/>
  <line x1="245" y1="153" x2="245" y2="160" stroke="#a04018" stroke-width="2"/>
  <line x1="255" y1="153" x2="255" y2="160" stroke="#a04018" stroke-width="2"/>
  <!-- Lanyard hole -->
  <circle cx="75" cy="200" r="8" fill="white" stroke="#333" stroke-width="2"/>
  <!-- Cardboard box below -->
  <rect x="60" y="280" width="280" height="90" rx="3" fill="#c8a878" stroke="#333" stroke-width="2.5"/>
  <!-- Box tape -->
  <rect x="170" y="275" width="60" height="100" fill="#d8c090" stroke="#999" stroke-width="1.5"/>
  <!-- Tape center line -->
  <line x1="200" y1="278" x2="200" y2="372" stroke="#c0a870" stroke-width="1"/>
  <!-- Box flaps (top) -->
  <path d="M60 280 L60 270 Q100 260 170 270 L170 280" fill="#c8a878" stroke="#333" stroke-width="2"/>
  <path d="M230 280 L230 270 Q280 260 340 270 L340 280" fill="#c8a878" stroke="#333" stroke-width="2"/>
  <!-- Shipping label -->
  <rect x="80" y="300" width="70" height="45" rx="2" fill="#f8f4ec" stroke="#999" stroke-width="1.5"/>
  <line x1="88" y1="315" x2="142" y2="315" stroke="#ccc" stroke-width="1.5"/>
  <line x1="88" y1="325" x2="135" y2="325" stroke="#ccc" stroke-width="1.5"/>
  <line x1="88" y1="335" x2="120" y2="335" stroke="#ccc" stroke-width="1.5"/>
</svg>
