<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="white"/>
  <!-- Person gleefully ripping open envelope -->
  <!-- Head -->
  <circle cx="200" cy="95" r="45" fill="none" stroke="black" stroke-width="3"/>
  <!-- Happy closed eyes -->
  <path d="M180 86 Q185 80 190 86" fill="none" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <path d="M210 86 Q215 80 220 86" fill="none" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <!-- Big grin -->
  <path d="M178 108 Q200 128 222 108" fill="none" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <!-- Blush -->
  <line x1="163" y1="100" x2="173" y2="100" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <line x1="227" y1="100" x2="237" y2="100" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <!-- Body -->
  <line x1="200" y1="140" x2="200" y2="250" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <!-- Left arm pulling left -->
  <path d="M200 180 Q150 190 120 210" fill="none" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <!-- Right arm pulling right -->
  <path d="M200 180 Q250 190 280 210" fill="none" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <!-- Left hand fingers gripping -->
  <path d="M115 210 L108 218" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M118 208 L110 215" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M122 207 L116 213" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right hand fingers gripping -->
  <path d="M278 210 L285 218" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M282 208 L290 215" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M284 207 L292 213" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Envelope left half -->
  <path d="M90 215 L140 215 L140 250 L90 250Z" fill="none" stroke="black" stroke-width="2.5"/>
  <path d="M90 215 L115 232 L140 215" fill="none" stroke="black" stroke-width="2"/>
  <!-- Envelope right half -->
  <path d="M260 215 L310 215 L310 250 L260 250Z" fill="none" stroke="black" stroke-width="2.5"/>
  <path d="M260 215 L285 232 L310 215" fill="none" stroke="black" stroke-width="2"/>
  <!-- RIP! text -->
  <text x="180" y="225" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="black">RIP!</text>
  <!-- Tear lines -->
  <line x1="170" y1="230" x2="165" y2="220" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <line x1="200" y1="232" x2="200" y2="218" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <line x1="230" y1="230" x2="235" y2="220" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <!-- Paper scraps flying -->
  <path d="M185 240 L188 235 L192 240" fill="none" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M205 238 L208 233 L212 238" fill="none" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Letter peeking out -->
  <rect x="265" y="220" width="35" height="20" fill="none" stroke="black" stroke-width="1.5" rx="1"/>
  <line x1="270" y1="226" x2="295" y2="226" stroke="black" stroke-width="1" stroke-linecap="round"/>
  <line x1="270" y1="232" x2="290" y2="232" stroke="black" stroke-width="1" stroke-linecap="round"/>
  <!-- Sparkles -->
  <path d="M100 75 L103 67 L106 75 L114 72 L106 77 L110 85 L104 79 L100 85 L102 77 L94 73Z" fill="black" stroke="none"/>
  <path d="M290 75 L293 67 L296 75 L304 72 L296 77 L300 85 L294 79 L290 85 L292 77 L284 73Z" fill="black" stroke="none"/>
  <!-- Legs -->
  <line x1="200" y1="250" x2="178" y2="340" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="250" x2="222" y2="340" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <path d="M178 340 L163 345" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <path d="M222 340 L237 345" stroke="black" stroke-width="3" stroke-linecap="round"/>
</svg>
