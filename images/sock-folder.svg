<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="white"/>
  <!-- Sock Folding Board - flat board with fold lines -->
  <!-- Main board -->
  <rect x="80" y="80" width="240" height="300" rx="5" fill="#5b9bd5" stroke="#333" stroke-width="3"/>
  <!-- Fold panel lines (dashed) -->
  <line x1="160" y1="80" x2="160" y2="380" stroke="#fff" stroke-width="2" stroke-dasharray="8,6"/>
  <line x1="240" y1="80" x2="240" y2="380" stroke="#fff" stroke-width="2" stroke-dasharray="8,6"/>
  <line x1="80" y1="220" x2="320" y2="220" stroke="#fff" stroke-width="2" stroke-dasharray="8,6"/>
  <!-- Fold arrows -->
  <!-- Left fold arrow -->
  <path d="M130 160 L100 160" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M108 154 L100 160 L108 166" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right fold arrow -->
  <path d="M270 160 L300 160" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M292 154 L300 160 L292 166" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom fold arrow -->
  <path d="M200 260 L200 290" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M194 282 L200 290 L206 282" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Sock on the board -->
  <path d="M170 110 L170 200 Q170 240 190 250 Q210 255 220 240 Q230 220 230 200 L230 110Z" fill="#f0e0d0" stroke="#333" stroke-width="2.5"/>
  <!-- Sock heel curve -->
  <path d="M170 200 Q165 230 185 248" fill="none" stroke="#d8c8b8" stroke-width="2"/>
  <!-- Sock toe -->
  <path d="M190 250 Q205 260 220 245" fill="none" stroke="#d8c8b8" stroke-width="2"/>
  <!-- Sock ribbing at top -->
  <rect x="170" y="110" width="60" height="20" rx="3" fill="#e0d0c0" stroke="#333" stroke-width="2"/>
  <line x1="175" y1="116" x2="225" y2="116" stroke="#c8b8a8" stroke-width="1.5"/>
  <line x1="175" y1="122" x2="225" y2="122" stroke="#c8b8a8" stroke-width="1.5"/>
  <!-- Second sock peeking out -->
  <path d="M180 130 L180 195 Q180 225 195 235" fill="none" stroke="#c8b8a8" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/>
</svg>
