<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="white"/>
  <!-- Multi-blade Herb Scissors - 5 parallel blades -->
  <!-- Top handle/finger loop -->
  <ellipse cx="120" cy="100" rx="55" ry="40" fill="none" stroke="#333" stroke-width="4"/>
  <ellipse cx="120" cy="100" rx="40" ry="28" fill="white" stroke="#333" stroke-width="3"/>
  <!-- Bottom handle/finger loop -->
  <ellipse cx="120" cy="290" rx="55" ry="40" fill="none" stroke="#333" stroke-width="4"/>
  <ellipse cx="120" cy="290" rx="40" ry="28" fill="white" stroke="#333" stroke-width="3"/>
  <!-- Pivot/screw area -->
  <circle cx="190" cy="195" r="12" fill="#ccc" stroke="#333" stroke-width="3"/>
  <circle cx="190" cy="195" r="5" fill="#999"/>
  <!-- Top set of blades (5 parallel) -->
  <path d="M155 80 Q175 120 190 190" fill="none" stroke="#888" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M160 85 Q178 125 192 190" fill="none" stroke="#999" stroke-width="3" stroke-linecap="round"/>
  <path d="M165 90 Q181 130 194 190" fill="none" stroke="#888" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M170 95 Q184 135 196 190" fill="none" stroke="#999" stroke-width="3" stroke-linecap="round"/>
  <path d="M175 100 Q187 140 198 190" fill="none" stroke="#888" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Blade extensions going right (top set) -->
  <line x1="190" y1="185" x2="340" y2="170" stroke="#aaa" stroke-width="3"/>
  <line x1="192" y1="188" x2="345" y2="174" stroke="#bbb" stroke-width="2.5"/>
  <line x1="194" y1="191" x2="350" y2="178" stroke="#aaa" stroke-width="3"/>
  <line x1="196" y1="194" x2="345" y2="182" stroke="#bbb" stroke-width="2.5"/>
  <line x1="198" y1="197" x2="340" y2="186" stroke="#aaa" stroke-width="3"/>
  <!-- Bottom set of blades (5 parallel) -->
  <path d="M155 310 Q175 270 190 200" fill="none" stroke="#888" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M160 305 Q178 265 192 200" fill="none" stroke="#999" stroke-width="3" stroke-linecap="round"/>
  <path d="M165 300 Q181 260 194 200" fill="none" stroke="#888" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M170 295 Q184 255 196 200" fill="none" stroke="#999" stroke-width="3" stroke-linecap="round"/>
  <path d="M175 290 Q187 250 198 200" fill="none" stroke="#888" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Bottom blade extensions going right -->
  <line x1="190" y1="205" x2="340" y2="215" stroke="#aaa" stroke-width="3"/>
  <line x1="192" y1="202" x2="345" y2="211" stroke="#bbb" stroke-width="2.5"/>
  <line x1="194" y1="199" x2="350" y2="207" stroke="#aaa" stroke-width="3"/>
  <line x1="196" y1="196" x2="345" y2="203" stroke="#bbb" stroke-width="2.5"/>
  <line x1="198" y1="193" x2="340" y2="199" stroke="#aaa" stroke-width="3"/>
  <!-- Blade tips -->
  <path d="M340 170 L355 168" stroke="#999" stroke-width="2" stroke-linecap="round"/>
  <path d="M350 178 L365 176" stroke="#999" stroke-width="2" stroke-linecap="round"/>
  <path d="M340 186 L355 185" stroke="#999" stroke-width="2" stroke-linecap="round"/>
  <path d="M340 215 L355 217" stroke="#999" stroke-width="2" stroke-linecap="round"/>
  <path d="M350 207 L365 209" stroke="#999" stroke-width="2" stroke-linecap="round"/>
  <path d="M340 199 L355 200" stroke="#999" stroke-width="2" stroke-linecap="round"/>
</svg>
