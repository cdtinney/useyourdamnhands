<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="white"/>
  <!-- Egg Separator - spoon-like with slots -->
  <!-- Handle -->
  <rect x="175" y="20" width="50" height="120" rx="10" fill="#e0e0e0" stroke="#333" stroke-width="3"/>
  <!-- Handle hook at top for resting on bowl -->
  <path d="M175 30 Q155 20 150 40 Q148 55 165 55" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <!-- Handle details -->
  <line x1="185" y1="50" x2="215" y2="50" stroke="#bbb" stroke-width="2"/>
  <line x1="185" y1="65" x2="215" y2="65" stroke="#bbb" stroke-width="2"/>
  <line x1="185" y1="80" x2="215" y2="80" stroke="#bbb" stroke-width="2"/>
  <!-- Neck connecting handle to bowl -->
  <path d="M180 140 Q185 160 180 180" fill="none" stroke="#333" stroke-width="3"/>
  <path d="M220 140 Q215 160 220 180" fill="none" stroke="#333" stroke-width="3"/>
  <rect x="180" y="135" width="40" height="10" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
  <!-- Bowl/cup shape -->
  <ellipse cx="200" cy="260" rx="100" ry="85" fill="#f0f0f0" stroke="#333" stroke-width="3.5"/>
  <!-- Raised center area for yolk -->
  <ellipse cx="200" cy="250" rx="50" ry="40" fill="#e8e8e8" stroke="#333" stroke-width="2.5"/>
  <!-- Slots for egg white to drain -->
  <path d="M120 240 Q115 260 120 280" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <path d="M140 230 Q133 255 138 285" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <path d="M160 222 Q152 252 158 290" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <path d="M240 222 Q248 252 242 290" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <path d="M260 230 Q267 255 262 285" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <path d="M280 240 Q285 260 280 280" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <!-- Egg yolk sitting in center -->
  <ellipse cx="200" cy="248" rx="30" ry="24" fill="#f5c842" stroke="#e0a820" stroke-width="2"/>
  <!-- Yolk highlight -->
  <ellipse cx="192" cy="240" rx="8" ry="6" fill="#f8dc80" opacity="0.6"/>
</svg>
